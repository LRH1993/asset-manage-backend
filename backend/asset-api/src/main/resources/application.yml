spring:
  application:
    name: asset-management

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/asset_management?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ruheng
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true

# 日志配置
logging:
  level:
    com.asset: DEBUG
    org.springframework: INFO

# 行情数据配置
market-data:
  timeout: 10000
  retry-count: 3
  batch-interval: 500
  east-money:
    stock-url: https://push2.eastmoney.com/api/qt/stock/get
    batch-url: https://push2.eastmoney.com/api/qt/ulist.np
    fund-url: https://fundgz.1234567.com.cn/js
  yahoo:
    base-url: https://query1.finance.yahoo.com/v8/finance/chart
    request-interval: 200
  fund:
    url: https://fundgz.1234567.com.cn/js
    detail-url: https://fund.eastmoney.com/pingzhongdata